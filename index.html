<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
  </head>
  <body style="margin: 0; background: #050505; color: white; font-family: sans-serif; overflow-x: hidden;">
    <div id="root">
      <div style="min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding-top: 80px; px: 24px; text-align: center;">
        <div style="display: inline-flex; align-items: center; gap: 8px; margin-bottom: 24px; padding: 4px 12px; border-radius: 999px; border: 1px solid rgba(34, 197, 94, 0.2); background: rgba(34, 197, 94, 0.05);">
          <div style="width: 8px; height: 8px; background: #22c55e; border-radius: 50%;"></div>
          <span style="font-size: 10px; font-weight: bold; letter-spacing: 2px; color: #4ade80; text-transform: uppercase;">Live Signals Active</span>
        </div>
        <h1 style="font-size: 48px; font-weight: 900; letter-spacing: -2px; margin: 0 0 8px 0;">NOVA <span style="color: #3b82f6;">PRIME</span></h1>
        <p style="font-size: 10px; letter-spacing: 4px; color: #71717a; text-transform: uppercase; margin-bottom: 40px;">Trading Institute</p>
        
        <!-- Link Skeletons -->
        <div style="width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; padding: 0 24px;">
          <div style="height: 80px; background: #3b82f6; border-radius: 12px;"></div>
          <div style="height: 80px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;"></div>
          <div style="height: 80px; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px;"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
